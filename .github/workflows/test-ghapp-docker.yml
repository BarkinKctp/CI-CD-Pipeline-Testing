name: GitHub App Docker Flow Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "test/**"
      - "ghapp/**"

permissions:
  contents: read

jobs:
  test_docker_flow:
    runs-on: ubuntu-latest

    env:
      TARGET_REPO: BarkinKctp/ghapp-oidc-deploy-test
      DOCKER_TEST_IMAGE: brkndocker/ghapp-test:latest

    steps:
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APPLICATION_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

     
    # - name: Export app token like Citus style
    #  run: |
    #   echo "GH_TOKEN={{ steps.app.outputs.token }}" >> $GITHUB_ENV
    #  echo "GITHUB_TOKEN={{ steps.app.outputs.token }}" >> $GITHUB_ENV
    
      - name: Debug repo layout
        run: |
              pwd
              ls -la
              find app -maxdepth 3 -type f | sort
  
      - name: Run pytest that triggers docker run
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          pytest -q app/tests/test_ghapp_docker -s