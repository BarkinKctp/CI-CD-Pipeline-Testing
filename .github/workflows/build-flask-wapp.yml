# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and Deploy Flask Web App to Azure

env:
  DEPLOY_PKG_DIR: deploy_pkg
  DEPLOY_ZIP: deploy.zip
  WAIT_SECONDS: "20"
  STARTUP_FILE: "gunicorn --bind=0.0.0.0 --timeout 600 app.main:app"

on:
  workflow_dispatch:
    inputs:
      webapp_name:
        description: "Azure Web App name"
        required: false
        type: string
      resource_group:
        description: "Azure RG Name for the target web app.
          Required when your ARM deployment used a different RG name."
        required: false
        type: string
      tag_key:
        description: "Tag key for lookup.
          Required if webapp_name is not provided."
        required: false
        default: "repo"
        type: string
      tag_value:
        description: "Tag value for lookup."
        required: false
        type: string
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Python 3.12 is better supported.

  
      # Optional (can be used for debugging or if you want to run tests in the build job).
      # If takes longer time, can be moved to a separate test job.
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # By default, when you enable GitHub CI/CD integration through the Azure portal, 
      # the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. 
      # This triggers the use of Oryx, a build engine that handles application compilation and dependency 
      # installation (e.g., pip install) directly on the platform during deployment. 
      # Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size.
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            app/
            requirements.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APPLICATION_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app.outputs.token }}
          clean: false

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: deploy_pkg

      - name: Debug deployment payload
        run: bash scripts/azure-webapp-workflow.sh debug_payload

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve web app name (dispatch > repo var > tag)
        id: resolveapp
        env:
          INPUT_APP_NAME: ${{ github.event.inputs.webapp_name || '' }}
          INPUT_TAG_KEY: ${{ github.event.inputs.tag_key || '' }}
          INPUT_TAG_VALUE: ${{ github.event.inputs.tag_value || '' }}
          REPO_APP_NAME: ${{ vars.WEBAPP_NAME || '' }}
          DEFAULT_TAG_VALUE: ${{ github.event.repository.name }}
        run: bash scripts/azure-webapp-workflow.sh resolve_app_name

      - name: Preflight Azure target validation
        id: preflight
        env:
          APP_NAME: ${{ steps.resolveapp.outputs.app_name }}
          INPUT_RESOURCE_GROUP: ${{ github.event.inputs.resource_group || '' }}
        run: bash scripts/azure-webapp-workflow.sh preflight_validate

      - name: Verify package and create deploy zip
        run: bash scripts/azure-webapp-workflow.sh package_deploy

      - name: Deploy to Azure Web App (attempt 1)
        id: deploy_to_webapp_attempt_1
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        timeout-minutes: 12
        with:
          app-name: ${{ steps.resolveapp.outputs.app_name }}
          slot-name: Production
          package: deploy.zip

      - name: Restart app + wait before retry
        if: steps.deploy_to_webapp_attempt_1.outcome == 'failure'
        env:
          APP_NAME: ${{ steps.resolveapp.outputs.app_name }}
          RESOURCE_GROUP: ${{ steps.preflight.outputs.resource_group }}
        run: bash scripts/azure-webapp-workflow.sh restart_before_retry

      - name: Deploy to Azure Web App (attempt 2)
        id: deploy_to_webapp_attempt_2
        if: steps.deploy_to_webapp_attempt_1.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        timeout-minutes: 12
        with:
          app-name: ${{ steps.resolveapp.outputs.app_name }}
          slot-name: Production
          package: deploy.zip

      - name: Configure startup command (Gunicorn) + restart
        if: steps.deploy_to_webapp_attempt_1.outcome == 'success' || steps.deploy_to_webapp_attempt_2.outcome == 'success'
        env:
          APP_NAME: ${{ steps.resolveapp.outputs.app_name }}
          RESOURCE_GROUP: ${{ steps.preflight.outputs.resource_group }}
        run: bash scripts/azure-webapp-workflow.sh configure_startup

      - name: Fail if deployment did not succeed
        if: steps.deploy_to_webapp_attempt_1.outcome == 'failure' && steps.deploy_to_webapp_attempt_2.outcome == 'failure'
        run: |
          echo "::error::Deployment failed in both attempts."
          exit 1
