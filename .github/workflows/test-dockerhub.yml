name: GitHub App Docker Flow Test and Push (Docker Hub Image)

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKER_TEST_IMAGE: brkndocker/ghapp-test:latest
  SHA_IMAGE_TAG: brkndocker/ghapp-test:${{ github.sha }}  
  TARGET_REPO: BarkinKctp/ghapp-oidc-deploy-test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "test/**"
      - "ghapp/**"

permissions:
  contents: read

jobs:
  test_docker_flow:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APPLICATION_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: ${{ github.repository_owner }}
      
      - name: Set GH_TOKEN for all steps
        run: echo "GH_TOKEN=${{ steps.app.outputs.token }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app.outputs.token }}

      - name: Configure git with x-access-token
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install python requirements
        run: python -m pip install -r requirements.txt

      - name: Build, test, and push Docker image (if tests pass)
        env:
          TARGET_REPO: ${{ env.TARGET_REPO }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m app.build_dockerhub_packages