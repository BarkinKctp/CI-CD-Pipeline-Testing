name: Create Github App Token For Other Workflows

on:
  workflow_call:
    outputs:
      token:
        description: 'GitHub App Token'
        value: ${{ jobs.create-token.outputs.token }}

jobs:
  create-token:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.app.outputs.token }}

    steps:
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APPLICATION_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set GH_TOKEN for all steps
        run: echo "GH_TOKEN=${{ steps.app.outputs.token }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app.outputs.token }}

      - name: Configure git with x-access-token
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
