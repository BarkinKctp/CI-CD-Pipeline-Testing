name: Publish Jenkins Agent Image (Python + Docker CLI)

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  AGENT_IMAGE: brkndocker/jenkins-agent
  DOCKERFILE_PATH: docker/jenkins-agent-image/Dockerfile
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docker/jenkins-agent-image/Dockerfile'
      - '.github/workflows/publish-docker-image.yml'

concurrency:
  group: publish-jenkins-agent
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Jenkins Agent Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        