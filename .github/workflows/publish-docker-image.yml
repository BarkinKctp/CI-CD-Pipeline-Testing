name: Publish GH App Test Image

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  SHA_IMAGE_TAG: brkndocker/ghapp-test:${{ github.sha }}
  DOCKER_TEST_IMAGE: brkndocker/ghapp-test:latest
  TARGET_REPO: BarkinKctp/ghapp-oidc-deploy-test

on:
  workflow_dispatch:

jobs:
  create-token:
    uses: ./.github/workflows/create-app-token.yml
    secrets: inherit
  
  publish:
    runs-on: ubuntu-latest
    needs: create-token

    steps:

      - name: Install python requirements
        run: python -m pip install -r requirements.txt

      - name: Build and push Docker image
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m app.build_dockerhub_packages
        