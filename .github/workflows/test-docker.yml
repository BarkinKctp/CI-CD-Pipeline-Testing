name: GitHub App Docker Flow Test (Local Dockerfile)

env:
  TARGET_REPO: BarkinKctp/ghapp-oidc-deploy-test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APPLICATION_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: ${{ github.repository_owner }}
      
      - name: Set GH_TOKEN for all steps # Experimental to enable authenticated git operations in subsequent steps using GH_TOKEN
        run: echo "GH_TOKEN=${{ steps.app.outputs.token }}" >> $GITHUB_ENV

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app.outputs.token }}
      
      - name: Configure git authentication # Experimental, to enable authenticated git operations in subsequent steps using GH_TOKEN
        run: git config --global url."https://${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Set up Python and install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Run Flask app tests (build local image and test)
        id: build_tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m app.build_local_packages

      - name: Run validation tests in Docker
        id: docker_tests
        run: docker run --rm -v ${{ github.workspace }}:/app flask-app-test pytest -q app/tests/validation_test.py

      - name: Write and push test result file
        env:
          TARGET_BRANCH: main
          BUILD_TEST_OUTCOME: ${{ steps.build_tests.outcome }}
          DOCKER_TEST_OUTCOME: ${{ steps.docker_tests.outcome }}
        run: bash scripts/push-results.sh
          