name: GitHub App Docker Flow Test (Local Dockerfile)

env:
  TARGET_REPO: BarkinKctp/ghapp-oidc-deploy-test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APPLICATION_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app.outputs.token }}

      - name: Configure git with x-access-token
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Set up Python and install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Build local image, run tests, and push results
        env:
          PYTHONPATH: ${{ github.workspace }}
          TARGET_BRANCH: main
        run: python -m app.build_local_packages
          