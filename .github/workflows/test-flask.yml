name: Test Flask App

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APPLICATION_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}
          owner: ${{ github.repository_owner }}

      #- name: Export token to environment
      #  run: echo "GH_TOKEN=$ {{ steps.app.outputs.token }}" >> $GITHUB_ENV
      #  Makes it avaliable to the whole workflow without needing to pass it explicitly to each step.
      #  GH_TOKEN is a common name for GitHub tokens, and some tools might expect it to be named this way.

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app.outputs.token }}

      - name: Validate token (gh / curl / etc.)
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          gh api repos/${{ github.repository }} --jq '.full_name'

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main tests
        id: main_tests
        run: |
          python -m unittest app/main_test.py

      - name: Write test result file
        if: always()
        run: |
          mkdir -p results

          TEST_STATUS="failure"
          if [ "${{ steps.main_tests.outcome }}" = "success" ]; then
            TEST_STATUS="success"
          fi

          RESULT_FILE="results/test-flask-${GITHUB_RUN_ID}.md"
          {
            echo "# Test Flask Workflow Result"
            echo
            echo "- Status: ${TEST_STATUS}"
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Branch/Ref: ${GITHUB_REF}"
            echo "- Run ID: ${GITHUB_RUN_ID}"
            echo "- Run Number: ${GITHUB_RUN_NUMBER}"
            echo "- Workflow: ${GITHUB_WORKFLOW}"
          } > "$RESULT_FILE"

          echo "Wrote test result to $RESULT_FILE"
          ls -la results

      - name: Push results to private repo
        if: always() && github.event_name != 'pull_request'
        continue-on-error: true
        timeout-minutes: 5
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          TARGET_REPO: BarkinKctp/ghapp-oidc-deploy-test
          TARGET_BRANCH: main
        run: |
          echo "Results generated in results/ for this run."
